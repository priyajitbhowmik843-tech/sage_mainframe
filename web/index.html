<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SAGE Mainframe Terminal OS - Internal Management App">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="sage_mainframe">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>sage_mainframe</title>
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
        }
      });
    }
  </script>

<script>
  window.onerror = function(message, source, lineno, colno, error) {
    var div = document.createElement('div');
    div.style.position = 'fixed';
    div.style.top = '0';
    div.style.left = '0';
    div.style.width = '100vw';
    div.style.height = '100vh';
    div.style.backgroundColor = 'red';
    div.style.color = 'white';
    div.style.zIndex = '999999';
    div.style.padding = '20px';
    div.style.fontSize = '20px';
    div.style.whiteSpace = 'pre-wrap';
    div.style.overflow = 'auto';
    div.innerText = 'ERROR OCCURRED:\n\n' + message + '\n\n' + source + ':' + lineno + ':' + colno + '\n\n' + (error && error.stack ? error.stack : '');
    document.body.appendChild(div);
  };
  window.addEventListener('unhandledrejection', function(event) {
    var div = document.createElement('div');
    div.style.position = 'fixed';
    div.style.top = '0';
    div.style.left = '0';
    div.style.width = '100vw';
    div.style.height = '100vh';
    div.style.backgroundColor = 'red';
    div.style.color = 'white';
    div.style.zIndex = '999999';
    div.style.padding = '20px';
    div.style.fontSize = '20px';
    div.style.whiteSpace = 'pre-wrap';
    div.style.overflow = 'auto';
    div.innerText = 'UNHANDLED PROMISE REJECTION:\n\n' + (event.reason ? event.reason.toString() + '\n\n' + event.reason.stack : 'Unknown Reason');
    document.body.appendChild(div);
  });
</script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js?v=3" async></script>
</body>
</html>
